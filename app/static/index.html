<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AION — Connexion Garmin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0a0f;
      --surface: #13131a;
      --border:  #1e1e2e;
      --accent:  #6ee7b7;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --error:   #f87171;
      --success: #6ee7b7;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }
    body {
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35; z-index: 0; pointer-events: none;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(110,231,183,0.07) 0%, transparent 70%); top: -150px; right: -150px; }
    .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, transparent 70%); bottom: -100px; left: -100px; }
    .container { position: relative; z-index: 1; width: 100%; max-width: 420px; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .header { text-align: center; margin-bottom: 28px; }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .logo-icon { width: 32px; height: 32px; border: 1.5px solid var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo-icon::before { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 0.12em; }
    .header h1 { font-size: 24px; font-weight: 700; line-height: 1.25; margin-bottom: 8px; }
    .header h1 span { color: var(--accent); }
    .header p { font-size: 13px; color: var(--muted); line-height: 1.6; font-family: 'DM Mono', monospace; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.4; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; font-family: 'DM Mono', monospace; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 11px 13px; font-size: 14px; font-family: 'DM Mono', monospace; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,231,183,0.08); }
    input::placeholder { color: var(--muted); }
    .notice { display: flex; gap: 9px; align-items: flex-start; background: rgba(110,231,183,0.05); border: 1px solid rgba(110,231,183,0.15); border-radius: 7px; padding: 11px 13px; margin-bottom: 20px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); line-height: 1.5; }
    .notice-icon { color: var(--accent); flex-shrink: 0; margin-top: 1px; }
    button[type="submit"] { width: 100%; padding: 13px; background: var(--accent); color: #0a0a0f; border: none; border-radius: 7px; font-size: 14px; font-weight: 700; font-family: 'Syne', sans-serif; letter-spacing: 0.04em; cursor: pointer; transition: opacity 0.2s, transform 0.15s; position: relative; overflow: hidden; }
    button[type="submit"]:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    button[type="submit"]:active:not(:disabled) { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-text { transition: opacity 0.2s; }
    .btn-loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .loading .btn-text { opacity: 0; }
    .loading .btn-loader { opacity: 1; }
    .spinner { width: 17px; height: 17px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #0a0a0f; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .feedback { margin-top: 14px; padding: 11px 13px; border-radius: 7px; font-size: 12px; font-family: 'DM Mono', monospace; line-height: 1.5; display: none; animation: fadeUp 0.3s ease both; }
    .feedback.error { display: block; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .feedback.success { display: block; background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.3); color: var(--success); }
    .success-state { display: none; text-align: center; padding: 16px 0 8px; animation: fadeUp 0.4s ease both; }
    .success-state.visible { display: block; }
    .checkmark { width: 52px; height: 52px; border-radius: 50%; background: rgba(110,231,183,0.1); border: 1.5px solid var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 22px; }
    .success-state h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--accent); }
    .success-state p { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.6; }
    .tag { display: inline-block; background: rgba(110,231,183,0.1); color: var(--accent); font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 4px; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon"></div>
        <span class="logo-text">AION</span>
      </div>
      <h1>Connecte ton <span>Garmin</span></h1>
      <p>Tes données restent privées et ne sont<br>utilisées que dans le cadre du projet AION.</p>
    </div>
    <div class="card">
      <div id="formState">
        <div class="field">
          <label>Ton prénom</label>
          <input type="text" id="name" placeholder="ex: Laurent" autocomplete="off" />
        </div>
        <div class="field">
          <label>Email Garmin Connect</label>
          <input type="email" id="email" placeholder="ton@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Mot de passe Garmin Connect</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="notice">
          <span class="notice-icon">🔒</span>
          <span>Ton mot de passe est utilisé <strong>une seule fois</strong> pour générer un token sécurisé. Il n'est jamais stocké.</span>
        </div>
        <button type="submit" id="submitBtn" onclick="handleSubmit()">
          <span class="btn-text">Connecter mon compte</span>
          <span class="btn-loader"><span class="spinner"></span></span>
        </button>
        <div class="feedback" id="feedback"></div>
      </div>
      <div class="success-state" id="successState">
        <div class="checkmark">✓</div>
        <h2>Compte connecté !</h2>
        <p>Tes données Garmin vont être<br>collectées automatiquement.</p>
        <div class="tag" id="successTag"></div>
      </div>
    </div>
  </div>
  <script>
    async function handleSubmit() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');
      const feedback = document.getElementById('feedback');
      feedback.className = 'feedback';
      feedback.textContent = '';
      if (!name || !email || !password) {
        feedback.className = 'feedback error';
        feedback.textContent = '→ Tous les champs sont requis.';
        return;
      }
      btn.disabled = true;
      btn.classList.add('loading');
      try {
        const res = await fetch('/users/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { detail: text || 'Erreur inconnue' }; }
        if (!res.ok) throw new Error(data.detail || 'Erreur inconnue');
        fetch('/collect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, start_date: '2023-01-01', end_date: new Date().toISOString().split('T')[0] }),
        });
        document.getElementById('successTag').textContent = '● collecte en cours pour ' + name;
        document.getElementById('formState').style.display = 'none';
        document.getElementById('successState').classList.add('visible');
      } catch (err) {
        feedback.className = 'feedback error';
        feedback.textContent = '→ ' + err.message;
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  </script>
</body>
</html>
